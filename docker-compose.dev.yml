services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_console
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      AC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agent_console
      AC_WORKSPACE_PATH: /workspace
    volumes:
      - ./api:/src
      - ${WORKSPACE_PATH:-../../workspace}:/workspace
      - ${HOME}/.claude:/root/.claude:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agent_console
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      AC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agent_console
      AC_REDIS_URL: redis://redis:6379/0
      AC_WORKSPACE_PATH: /workspace
      AC_CORS_ORIGINS: '["http://localhost:3002"]'
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: http://host.docker.internal:3001
    volumes:
      - ./api:/src
      - ${WORKSPACE_PATH:-../../workspace}:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./api
    command: python -m app.worker
    environment:
      AC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agent_console
      AC_REDIS_URL: redis://redis:6379/0
      AC_WORKSPACE_PATH: /workspace
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_HOST: http://host.docker.internal:3001
    volumes:
      - ./api:/src
      - ${WORKSPACE_PATH:-../../workspace}:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3002:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:

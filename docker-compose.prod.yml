services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-agent_console}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      AC_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-agent_console}
      AC_REDIS_URL: redis://redis:6379/0
      AC_WORKSPACE_PATH: /workspace
      AC_CORS_ORIGINS: '["${APP_URL:?Set APP_URL in .env}"]'
      AC_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      AC_API_BASE_URL: http://api:8000
    volumes:
      - workspace:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    command: python -m app.worker
    environment:
      AC_DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-agent_console}
      AC_REDIS_URL: redis://redis:6379/0
      AC_WORKSPACE_PATH: /workspace
      AC_JWT_SECRET: ${JWT_SECRET}
    volumes:
      - workspace:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  workspace:
  caddy_data:
  caddy_config:
